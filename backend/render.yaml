services:
  - type: web
    name: portfolio-backend
    env: node
    plan: free # Note: Persistence requires a paid plan on Render, or use Railway
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: portfolio-db
      mountPath: /opt/render/project/src/backend/db
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        fromContext: secret
      - key: ALLOWED_ORIGIN
        placeholder: "https://hailemeskel.vercel.app"
